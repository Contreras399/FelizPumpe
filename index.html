<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mareni ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="contenedor-galeria">
        <div id="contador" class="contador"></div>

        <div class="tarjeta-secuencia">
            <div class="imagen-box">
                <img id="imagen-dinamica" src="" alt="Imagen de la secuencia">
            </div>
            
            <div class="info-secuencia">
                <h3 id="titulo-dinamico">Título de la imagen</h3>
                <p id="texto-dinamico">Descripción detallada de la imagen actual...</p>
            </div>
        </div>

        <div class="botones-container">
            <button id="btn-anterior" class="btn anterior">Anterior</button>
            <button id="btn-siguiente" class="btn siguiente">Siguiente</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
